<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6cf7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#af52de;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34c759;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>

  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.06" stroke="white" stroke-width="0.5" fill="none">
    <line x1="0" y1="50" x2="200" y2="50"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="150" x2="200" y2="150"/>
    <line x1="50" y1="0" x2="50" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
  </g>

  <!-- Figure doing a lunge/stretch -->
  <g transform="translate(100,95)" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="0" cy="-42" r="10" fill="white" stroke="none" opacity="0.95"/>

    <!-- Torso - slight lean forward -->
    <line x1="0" y1="-30" x2="-5" y2="10" stroke-width="5"/>

    <!-- Left arm reaching up/back (stretch) -->
    <line x1="-2" y1="-24" x2="-25" y2="-40"/>
    <line x1="-25" y1="-40" x2="-38" y2="-52"/>

    <!-- Right arm forward -->
    <line x1="-2" y1="-24" x2="20" y2="-15"/>
    <line x1="20" y1="-15" x2="32" y2="-22"/>

    <!-- Left leg (front, bent in lunge) -->
    <line x1="-5" y1="10" x2="-22" y2="32"/>
    <line x1="-22" y1="32" x2="-30" y2="52"/>

    <!-- Right leg (back, extended) -->
    <line x1="-5" y1="10" x2="18" y2="30"/>
    <line x1="18" y1="30" x2="40" y2="48"/>

    <!-- Joint circles (the key feature — highlighted joints!) -->
    <!-- Left shoulder -->
    <circle cx="-2" cy="-24" r="5" fill="url(#glow)" stroke="none"/>
    <circle cx="-2" cy="-24" r="8" fill="none" stroke="#34c759" stroke-width="1.5" opacity="0.5"/>

    <!-- Left elbow -->
    <circle cx="-25" cy="-40" r="4" fill="url(#glow)" stroke="none"/>
    <circle cx="-25" cy="-40" r="7" fill="none" stroke="#34c759" stroke-width="1" opacity="0.4"/>

    <!-- Right shoulder -->
    <circle cx="20" cy="-15" r="4" fill="url(#glow)" stroke="none"/>

    <!-- Left hip -->
    <circle cx="-5" cy="10" r="5" fill="url(#glow)" stroke="none"/>
    <circle cx="-5" cy="10" r="8" fill="none" stroke="#34c759" stroke-width="1.5" opacity="0.5"/>

    <!-- Left knee -->
    <circle cx="-22" cy="32" r="4.5" fill="url(#glow)" stroke="none"/>
    <circle cx="-22" cy="32" r="7.5" fill="none" stroke="#34c759" stroke-width="1" opacity="0.4"/>

    <!-- Right knee -->
    <circle cx="18" cy="30" r="4.5" fill="url(#glow)" stroke="none"/>
    <circle cx="18" cy="30" r="7.5" fill="none" stroke="#34c759" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- AI sparkle icon (top right) -->
  <g transform="translate(158,38)" fill="white" opacity="0.85">
    <path d="M0,-12 L2,-4 L10,-2 L2,0 L0,8 L-2,0 L-10,-2 L-2,-4 Z"/>
  </g>
  <g transform="translate(145,55)" fill="white" opacity="0.5">
    <path d="M0,-6 L1,-2 L5,-1 L1,0 L0,4 L-1,0 L-5,-1 L-1,-2 Z"/>
  </g>

  <!-- "RJ" text at bottom -->
  <text x="100" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" opacity="0.9" letter-spacing="3">RJ AI</text>
</svg>
