<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b0f"/>
      <stop offset="100%" style="stop-color:#161721"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff"/>
      <stop offset="50%" style="stop-color:#ff4081"/>
      <stop offset="100%" style="stop-color:#ffd740"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#ff4081"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="30%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(124,77,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(124,77,255,0)"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="70%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,64,129,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,64,129,0)"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="400" height="3" rx="1.5" fill="url(#accentLine)"/>
  <rect width="400" height="400" fill="url(#glowPurple)"/>
  <rect width="400" height="400" fill="url(#glowPink)"/>
  <text x="200" y="150" text-anchor="middle" font-size="80" fill="white">&#x1F3B2;</text>
  <text x="200" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="80" fill="url(#logoGrad)" letter-spacing="-2">B3TZ</text>
  <text x="200" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" fill="#e8e8ed">Find Your Nemesis</text>
  <text x="200" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#55566a" letter-spacing="2">BET ON ANYTHING</text>
  <rect x="0" y="397" width="400" height="3" rx="1.5" fill="url(#accentLine)"/>
</svg>
